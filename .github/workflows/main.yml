# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# NOTE:
# Do NOT hardcode PYTHONPATH or hostedtoolcache paths.
# Python patch versions and layouts change on GitHub runners.
# We derive all paths dynamically from sysconfig instead.

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v4

      # Install Python 3.14
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      # Python Diagnostics - Sysconfig
      - name: Python Diagnostics - Sysconfig
        run: python3 -m sysconfig

      # Python Diagnostics - Is libpython to be found?
      - name: Python Diagnostics - LDLIBRARY
        run: python3 -c "import sysconfig; print(sysconfig.get_config_var('LDLIBRARY'))"

      # Python Diagnostics - Names of modules in standard library
      - name: Python Diagnostics - Names of modules in standard library
        run: python3 -c "import sys ; print(sorted(sys.stdlib_module_names))"

      # Python Diagnostics - Names of builtin modules
      - name: Python Diagnostics - Names of builtin modules
        run: python3 -c "import sys ; print(sorted(sys.builtin_module_names))"

      # Python Diagnostics - Resolve libpython path
      #
      # We compute the *full path* to libpython using sysconfig.
      # This is robust across patch versions (3.14.x) and runner changes.
      - name: Export libpython path
        shell: bash
        run: |
          set -euo pipefail
          LIBDIR="$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR') or '')")"
          LDLIB="$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LDLIBRARY') or '')")"

          echo "LIBDIR=$LIBDIR"
          echo "LDLIBRARY=$LDLIB"

          echo "PYFFI_LIBPYTHON=$LIBDIR/$LDLIB" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$LIBDIR:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      # Sanity check
      - name: Python Diagnostics - Check libpython exists
        run: |
          echo "PYFFI_LIBPYTHON=$PYFFI_LIBPYTHON"
          ls -l "$PYFFI_LIBPYTHON"

      # Install Racket
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.8.1
        with:
          architecture: 'x64'
          distribution: 'full'
          variant: 'CS'
          version: '8.12'
          dest: '"${HOME}/racketdist"'
          local_catalogs: $GITHUB_WORKSPACE
          sudo: never

      # Package Installation (pyffi-lib)
      #
      # --no-docs avoids forcing runtime Python during initial install
      - name: Package Installation - Local Packages
        run: raco pkg install --no-docs --scope installation pyffi-lib

      # Configure Pyffi
      #
      # PYFFI_LIBPYTHON is available here and should be preferred by pyffi
      - name: Configure Pyffi
        run: |
          raco pyffi configure
          raco pyffi show
          raco pyffi diagnostics

      # Package Installation (pyffi-doc)
      - name: Package Installation (pyffi-doc)
        run: raco pkg install --scope installation pyffi-doc

      # Setup Local Packages
      - name: Setup Collections
        run: raco setup -v --check-pkg-deps pyffi

      # Build documentation with raco scribble
      #
      # xvfb-run is needed for Scribble on headless CI
      # - name: Build documentation with raco scribble
      #  run: |
      #    cd "$GITHUB_WORKSPACE"
      #    mkdir -p htmls
      #    xvfb-run -a raco scribble +m \
      #      --redirect-main http://pkg-build.racket-lang.org/doc/ \
      #      --htmls \
      #      --dest ./htmls \
      #      pyffi/pyffi-doc/pyffi/scribblings/manual-pyffi.scrbl

      # Build documentation with raco scribble
      #
      # xvfb-run is needed for Scribble on headless CI
      - name: Build documentation with raco scribble
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          echo "Workspace:"
          pwd
          echo "Top-level files:"
          ls -la

          echo "Searching for manual-pyffi.scrbl..."
          MANUAL="$(find . -name manual-pyffi.scrbl -print -quit)"
          echo "MANUAL=$MANUAL"

          if [ -z "$MANUAL" ]; then
            echo "ERROR: manual-pyffi.scrbl not found in workspace."
            echo "Here are candidate scribblings:"
            find . -maxdepth 5 -type f -name '*.scrbl' -print
            exit 1
          fi

          mkdir -p htmls
          xvfb-run -a raco scribble +m \
            --redirect-main http://pkg-build.racket-lang.org/doc/ \
            --htmls \
            --dest ./htmls \
            "$MANUAL"



      # Push to Github Pages
      - name: Push to Github Pages
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          folder: htmls/manual-pyffi
          branch: gh-pages
