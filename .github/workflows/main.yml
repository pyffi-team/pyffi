name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Python Diagnostics - Sysconfig
        run: python3 -m sysconfig

      - name: Python Diagnostics - LDLIBRARY
        run: python3 -c "import sysconfig; print(sysconfig.get_config_var('LDLIBRARY'))"

      - name: Python Diagnostics - Names of modules in standard library
        run: python3 -c "import sys ; print(sorted(sys.stdlib_module_names))"

      - name: Python Diagnostics - Names of builtin modules
        run: python3 -c "import sys ; print(sorted(sys.builtin_module_names))"

      - name: Export libpython path
        shell: bash
        run: |
          set -euo pipefail
          LIBDIR="$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR') or '')")"
          LDLIB="$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LDLIBRARY') or '')")"

          echo "LIBDIR=$LIBDIR"
          echo "LDLIBRARY=$LDLIB"

          echo "PYFFI_LIBPYTHON=$LIBDIR/$LDLIB" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$LIBDIR:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - name: Python Diagnostics - Check libpython exists
        run: |
          echo "PYFFI_LIBPYTHON=$PYFFI_LIBPYTHON"
          ls -l "$PYFFI_LIBPYTHON"

      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.8.1
        with:
          architecture: "x64"
          distribution: "full"
          variant: "CS"
          version: "8.12"
          dest: '"${HOME}/racketdist"'
          local_catalogs: $GITHUB_WORKSPACE
          sudo: never

      - name: Package Installation - Local Packages
        run: raco pkg install --no-docs --scope installation pyffi-lib

      - name: Configure Pyffi
        run: |
          raco pyffi configure
          raco pyffi show
          raco pyffi diagnostics

      - name: Package Installation (pyffi-doc)
        run: raco pkg install --scope installation pyffi-doc

      - name: Setup Collections
        run: raco setup -v --check-pkg-deps pyffi

      - name: Build documentation with raco scribble
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          echo "Workspace:"
          pwd
          echo "Top-level files:"
          ls -la

          echo "Searching for manual-pyffi.scrbl..."
          MANUAL="$(find . -name manual-pyffi.scrbl -print -quit)"
          echo "MANUAL=$MANUAL"

          if [ -z "$MANUAL" ]; then
            echo "ERROR: manual-pyffi.scrbl not found in workspace."
            echo "Here are candidate scribblings:"
            find . -maxdepth 5 -type f -name '*.scrbl' -print
            exit 1
          fi

          mkdir -p htmls
          xvfb-run -a raco scribble +m \
            --redirect-main http://pkg-build.racket-lang.org/doc/ \
            --htmls \
            --dest ./htmls \
            "$MANUAL"

      - name: Upload documentation artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: manual-pyffi-html
          path: htmls/manual-pyffi

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: manual-pyffi-html
          path: htmls/manual-pyffi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: htmls/manual-pyffi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
